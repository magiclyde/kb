<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>技术知识库</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap');

  /* ── 变量定义 ── */
  :root[data-theme="light"] {
    --bg: #f5f5f7;            /* 与管理后台完全一致 */
    --surface: #ffffff;       /* 纯白容器 */
    --border: #e2e2e9;        /* 柔和线条 */
    --text: #1a1a1e;          /* 深色文字 */
    --muted: #86868b;         /* 灰色次要文字 */
    --accent: #1a1a2e;        /* 保持深蓝标题 */
    --accent2: #c84b31;       /* 保持红褐点缀 */
    --tag-bg: #e8e8f0;        /* 标签颜色稍微调整以适配背景 */
    --code-bg: #efeff5;       /* 代码块背景 */
    --header-bg: rgba(245, 245, 247, 0.92); /* 顶部吸附栏透明度 */
    --shadow: 0 4px 12px rgba(0,0,0,.05);
  }

  :root[data-theme="dark"] {
    --bg: #0d0d0e;            /* 与管理后台完全一致 */
    --surface: #1a1a1c;       /* 与管理后台完全一致 */
    --border: #2a2a2e;        /* 与管理后台完全一致 */
    --text: #e8e8f0;          /* 与管理后台完全一致 */
    --muted: #86868b;         /* 与管理后台完全一致 */
    --accent: #e8e2d9;        /* 搜索端标题色 */
    --accent2: #e06c4c;       /* 调整后的深色模式红褐色，更明亮 */
    --tag-bg: #252529;        /* 略深于容器的标签色 */
    --code-bg: #111113;       /* 代码块使用更深的黑色以区分 */
    --header-bg: rgba(13, 13, 14, 0.92);
    --shadow: 0 4px 20px rgba(0,0,0,.4);
  }

  :root {
    --mono: 'JetBrains Mono', monospace;
    --serif: 'Noto Serif SC', serif;
    --sans: 'Space Grotesk', 'PingFang SC', sans-serif;
    transition: background 0.3s ease, color 0.3s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    transition: background 0.3s ease;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 max(24px, calc(50vw - 500px));
    display: flex; align-items: center; gap: 16px;
    height: 60px;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .logo-text {
    font-family: var(--mono); font-size: 14px; font-weight: 500;
    color: var(--accent); white-space: nowrap;
    letter-spacing: -0.02em;
  }
  .logo-text em { color: var(--accent2); font-style: normal; }

  /* ── THEME TOGGLE ── */
  .theme-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── SEARCH BAR ── */
  .search-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px 6px 14px;
    transition: border-color .15s, box-shadow .15s, background 0.3s;
  }
  .search-wrap:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(200,75,49,.08);
  }
  .search-icon { color: var(--muted); font-size: 15px; flex-shrink: 0; }
  #search-input {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: var(--sans); font-size: 14px; color: var(--text);
  }
  #search-input::placeholder { color: var(--muted); }

  select#category-filter {
    border: none; background: transparent; font-family: var(--mono);
    font-size: 11px; color: var(--muted); cursor: pointer; outline: none;
  }

  .search-btn {
    padding: 6px 16px; background: var(--accent); color: var(--bg);
    border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; white-space: nowrap;
    font-family: var(--sans);
  }
  .search-btn:hover { opacity: .85; transform: translateY(-1px); }
  .search-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 1000px; margin: 0 auto; padding: 40px 24px;
    display: grid; grid-template-columns: 1fr 280px; gap: 32px;
  }
  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── ANSWER AREA ── */
  .answer-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; box-shadow: var(--shadow);
    min-height: 120px; display: none;
    transition: background 0.3s, border-color 0.3s;
  }
  .answer-wrap.show { display: block; }

  .answer-meta {
    font-size: 11px; font-family: var(--mono); color: var(--muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .answer-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); }
  .status-text { color: var(--accent2); }

  .answer-body {
    font-family: var(--serif); font-size: 15px; line-height: 1.85;
    color: var(--text);
  }

  /* Markdown styles */
  .answer-body h1, .answer-body h2, .answer-body h3 {
    font-family: var(--sans); font-weight: 600; margin: 24px 0 12px;
    color: var(--text);
  }
  .answer-body h2 { font-size: 17px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .answer-body h3 { font-size: 15px; }
  .answer-body p { margin: 12px 0; }
  .answer-body code {
    font-family: var(--mono); font-size: 12px; background: var(--tag-bg);
    padding: 2px 5px; border-radius: 4px; color: var(--accent2);
  }
  .answer-body pre {
    background: var(--code-bg); border-radius: 8px; padding: 16px;
    overflow-x: auto; margin: 16px 0; border: 1px solid var(--border);
  }
  .answer-body pre code { background: none; color: var(--text); }
  
  /* ── SIDEBAR ── */
  .sources-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .source-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
    transition: all .2s; cursor: default;
  }
  .source-card:hover { border-color: var(--accent2); transform: translateX(4px); }
  .source-num { font-family: var(--mono); font-size: 10px; color: var(--accent2); font-weight: 500; }
  .source-doc { font-size: 12px; font-weight: 500; margin: 2px 0; }
  .source-heading { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .score-tag {
    font-family: var(--mono); font-size: 9px; padding: 2px 5px;
    border-radius: 3px; background: var(--tag-bg); color: var(--muted);
  }

  /* ── WELCOME ── */
  .welcome { grid-column: 1 / -1; text-align: center; padding: 80px 20px; }
  .welcome h2 { font-family: var(--serif); font-size: 32px; font-weight: 300; color: var(--text); margin-bottom: 16px; }
  .welcome p { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
  .hint-tag {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 18px; font-size: 12px; color: var(--muted);
    cursor: pointer; transition: all .2s; display: inline-block; margin: 4px;
  }
  .hint-tag:hover { border-color: var(--accent2); color: var(--accent2); background: var(--tag-bg); }

  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent2); vertical-align: text-bottom; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<header>
  <div class="logo-text">KB<em>/</em>SEARCH</div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="输入技术问题…" autocomplete="off" />
    <select id="category-filter">
      <option value="">全部分类</option>
      <option value="general">general</option>
      <option value="guide">guide</option>
      <option value="api">api</option>
      <option value="tutorial">tutorial</option>
      <option value="reference">reference</option>
    </select>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle">
    <span id="theme-icon">☼</span> <span id="theme-text">LIGHT</span>
  </button>
  <button class="search-btn" id="search-btn" onclick="doSearch()">提问</button>
</header>

<div class="container" id="main-container">
  <div class="welcome" id="welcome">
    <h2>技术知识库</h2>
    <p>基于 ParadeDB 的全文检索 + 向量语义搜索，BM25 与向量 RRF 混合精排</p>
    <div class="hint">
      <span class="hint-tag" onclick="fillQuery(this)">如何配置认证？</span>
      <span class="hint-tag" onclick="fillQuery(this)">API 限流策略</span>
      <span class="hint-tag" onclick="fillQuery(this)">部署最佳实践</span>
      <span class="hint-tag" onclick="fillQuery(this)">错误码说明</span>
    </div>
  </div>
</div>

<script>
// ── Theme Logic ──────────────────────────────────────────────────────
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('kb-search-theme', theme);
  const icon = document.getElementById('theme-icon');
  const text = document.getElementById('theme-text');
  
  if (theme === 'dark') {
    icon.textContent = '☾';
    text.textContent = 'DARK';
  } else {
    icon.textContent = '☼';
    text.textContent = 'LIGHT';
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

// 初始化主题 (优先读存储，其次读系统)
const savedTheme = localStorage.getItem('kb-search-theme');
const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
setTheme(savedTheme || (systemDark ? 'dark' : 'light'));

// ── 原有逻辑 ──────────────────────────────────────────────────────────
function renderMarkdown(md) {
  const codeBlocks = [];
  md = md.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    codeBlocks.push(`<pre><code class="lang-${lang}">${esc(code.trim())}</code></pre>`);
    return `\x00CODE${codeBlocks.length - 1}\x00`;
  });

  md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\x00CODE(\d+)\x00/g, (_, i) => codeBlocks[parseInt(i)])
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');

  return '<p>' + md + '</p>';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── State ─────────────────────────────────────────────────────────────
let currentController = null;
let rawAnswer = '';
let renderTimer = null;

function fillQuery(el) {
  document.getElementById('search-input').value = el.textContent;
  doSearch();
}

// ── Main search ───────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  if (currentController) currentController.abort();
  currentController = new AbortController();

  const category = document.getElementById('category-filter').value;
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = '检索中…';

  // Build layout
  const container = document.getElementById('main-container');
  container.innerHTML = `
    <div>
      <div class="answer-wrap show" id="answer-wrap">
        <div class="answer-meta"><div class="dot"></div><span class="status-text" id="status-text">正在检索…</span></div>
        <div class="answer-body" id="answer-body"></div>
      </div>
    </div>
    <div class="sidebar" id="sources-panel">
      <div class="sources-title">引用来源</div>
      <div id="sources-list"><div style="font-size:12px;color:var(--muted)">检索中…</div></div>
    </div>`;

  rawAnswer = '';
  try {
    const url = `/api/ask?q=${encodeURIComponent(q)}${category ? '&category=' + category : ''}`;
    const res = await fetch(url, { signal: currentController.signal });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try { handleEvent(JSON.parse(line.slice(6))); } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      const body = document.getElementById('answer-body');
      if (body) body.innerHTML = `<span style="color:#ef4444">❌ ${esc(e.message)}</span>`;
    }
  } finally {
    const cursor = document.querySelector('.cursor');
    if (cursor) cursor.remove();
    btn.disabled = false;
    btn.textContent = '提问';
  }
}

function handleEvent(evt) {
  const { type, data } = evt;
  if (type === 'status') {
    const el = document.getElementById('status-text');
    if (el) el.textContent = data;
  } else if (type === 'sources') {
    const list = document.getElementById('sources-list');
    if (!list) return;
    list.innerHTML = data.map((s, i) => `
      <div class="source-card">
        <div class="source-num">[${i+1}]</div>
        <div class="source-doc">${esc(s.docTitle)}</div>
        <div class="source-heading">${esc(s.heading)}</div>
        <div class="score-bar" style="display:flex;gap:4px;margin-top:6px;">
          <span class="score-tag">RRF ${s.rrfScore.toFixed(4)}</span>
        </div>
      </div>`).join('');
  } else if (type === 'answer_chunk') {
    rawAnswer += data;
    scheduleRender();
  } else if (type === 'done') {
    flushRender();
    const st = document.getElementById('status-text');
    if (st) st.textContent = '检索完成';
  }
}

function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => { renderTimer = null; flushRender(true); }, 40);
}

function flushRender(withCursor = false) {
  const body = document.getElementById('answer-body');
  if (!body) return;
  body.innerHTML = renderMarkdown(rawAnswer) + (withCursor ? '<span class="cursor"></span>' : '');
}

// ── Keyboard shortcut ─────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
